spring:
  application:
    name: home-service-platform

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:home_service}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate      # Flyway owns the schema, Hibernate only validates it
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-env-vars-never-commit-it}
    access-token-expiry-ms: 900000      # 15 minutes
    refresh-token-expiry-ms: 604800000  # 7 days

logging:
  level:
    com.homeservice: DEBUG
    org.springframework.security: INFO

# --- Groq AI configuration (OpenAI-compatible chat completions API) ---
groq:
  api-key: ${GROQ_API_KEY:}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}
  base-url: https://api.groq.com/openai/v1
